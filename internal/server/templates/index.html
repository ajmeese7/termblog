<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #terminal-container {
            height: 100%;
            overflow: hidden;
        }
    </style>
    <script>
        // Theme background colors - must match TUI themes
        var termBlogThemes = {
            pipboy: "#0a0a0a", dracula: "#282a36", nord: "#2e3440", monokai: "#272822",
            monochrome: "#000000", amber: "#0d0800", matrix: "#0d0208", paper: "#f5f5dc",
            terminal: "#000000"
        };
        // Apply theme background immediately to prevent flash of wrong color
        var defaultTheme = "{{.DefaultTheme}}";
        (function() {
            var savedTheme = localStorage.getItem("termblog-theme") || defaultTheme || "pipboy";
            var bg = termBlogThemes[savedTheme] || termBlogThemes[defaultTheme] || termBlogThemes.pipboy;
            // Set on html element immediately (before body exists)
            document.documentElement.style.setProperty("background-color", bg, "important");
        })();
    </script>
    <style>

        #terminal-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: inherit;
        }

        #terminal {
            width: 100%;
            height: 100%;
            max-width: 1200px;
        }

        .xterm {
            height: 100%;
        }

        .xterm-viewport {
            overflow-y: hidden !important;
            background-color: inherit !important;
        }

        /* Loading indicator */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff00;
            font-family: monospace;
            font-size: 16px;
        }

        #loading.hidden {
            display: none;
        }

        /* Connection status */
        #status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 3px;
            z-index: 100;
            transition: opacity 0.3s ease, background-color 0.3s ease;
        }

        #status.connected {
            background-color: #003300;
            color: #00ff00;
            opacity: 0.7;
        }

        #status.connected:hover {
            opacity: 1;
        }

        #status.connected.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #status.disconnected {
            background-color: #330000;
            color: #ff3333;
            opacity: 1;
        }

        #status.connecting {
            background-color: #333300;
            color: #ffcc00;
            opacity: 1;
        }

        #status.reconnecting {
            background-color: #332200;
            color: #ff9900;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="loading">Connecting...</div>
    <div id="status" class="connecting">Connecting</div>
    <div id="terminal-container">
        <div id="terminal"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.12.0/lib/addon-web-links.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.19.0/lib/addon-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako_inflate.min.js"></script>
    <script>
        const wsUrl = `${window.location.protocol === "https:" ? "wss" : "ws"}://${window.location.host}/ws`;

        // Theme definitions matching TUI themes
        const themes = {
            pipboy: {
                background: "#0a0a0a",
                foreground: "#00ff00",
                cursor: "#00ff00",
                cursorAccent: "#0a0a0a",

                brightGreen: "#33ff33",
                brightYellow: "#ffff33",
                brightBlue: "#6699ff",
                brightMagenta: "#ff66ff",
                brightCyan: "#66ffff",
                brightWhite: "#ffffff"
            },

                selectionBackground: "#44475a",
                black: "#21222c",
                red: "#ff5555",
                green: "#50fa7b",
                yellow: "#f1fa8c",
                blue: "#bd93f9",
                magenta: "#ff79c6",
                cyan: "#8be9fd",
                white: "#f8f8f2",
                brightBlack: "#6272a4",
                brightRed: "#ff6e6e",
                brightGreen: "#69ff94",
                brightYellow: "#ffffa5",
                brightBlue: "#d6acff",

            },
            nord: {

                cursorAccent: "#2e3440",
                selectionBackground: "#434c5e",
                black: "#3b4252",
                red: "#bf616a",
                green: "#a3be8c",
                yellow: "#ebcb8b",
                blue: "#81a1c1",
                magenta: "#b48ead",
                cyan: "#88c0d0",
                white: "#e5e9f0",
                brightBlack: "#4c566a",
                brightRed: "#bf616a",
                brightGreen: "#a3be8c",
                brightYellow: "#ebcb8b",
                brightBlue: "#81a1c1",
                brightMagenta: "#b48ead",
                brightCyan: "#8fbcbb",
                brightWhite: "#eceff4"
            },
            monokai: {
                background: "#272822",
                foreground: "#f8f8f2",
                cursor: "#f8f8f2",
                cursorAccent: "#272822",
                selectionBackground: "#49483e",
                black: "#272822",
                red: "#f92672",
                green: "#a6e22e",
                yellow: "#f4bf75",
                blue: "#66d9ef",
                magenta: "#ae81ff",
                cyan: "#a1efe4",
                white: "#f8f8f2",
                brightBlack: "#75715e",
                brightRed: "#f92672",
                brightGreen: "#a6e22e",
                brightYellow: "#f4bf75",
                brightBlue: "#66d9ef",
                brightMagenta: "#ae81ff",
                brightCyan: "#a1efe4",
                brightWhite: "#f9f8f5"
            },
            monochrome: {
                background: "#000000",
                foreground: "#ffffff",
                cursor: "#ffffff",
                cursorAccent: "#000000",
                selectionBackground: "#444444",
                black: "#000000",
                red: "#ff0000",
                green: "#ffffff",
                yellow: "#ffffff",
                blue: "#ffffff",
                magenta: "#ffffff",
                cyan: "#ffffff",
                white: "#ffffff",
                brightBlack: "#666666",
                brightRed: "#ff0000",
                brightGreen: "#ffffff",
                brightYellow: "#ffffff",
                brightBlue: "#ffffff",
                brightMagenta: "#ffffff",
                brightCyan: "#ffffff",
                brightWhite: "#ffffff"
            },
            amber: {
                background: "#0d0800",
                foreground: "#ffb000",
                cursor: "#ffb000",
                cursorAccent: "#0d0800",
                selectionBackground: "#331a00",
                black: "#0d0800",
                red: "#ff4500",
                green: "#ffb000",
                yellow: "#ffd700",
                blue: "#ff8c00",
                magenta: "#ffc740",
                cyan: "#ff8c00",
                white: "#ffb000",
                brightBlack: "#805800",
                brightRed: "#ff4500",
                brightGreen: "#ffc740",
                brightYellow: "#ffd700",
                brightBlue: "#ff8c00",
                brightMagenta: "#ffc740",
                brightCyan: "#ff8c00",
                brightWhite: "#ffc740"
            },
            matrix: {
                background: "#0d0208",
                foreground: "#00ff41",
                cursor: "#00ff41",
                cursorAccent: "#0d0208",
                selectionBackground: "#003b00",
                black: "#0d0208",
                red: "#ff0000",
                green: "#00ff41",
                yellow: "#00ff41",
                blue: "#008f11",
                magenta: "#39ff14",
                cyan: "#00ff41",
                white: "#00ff41",
                brightBlack: "#003b00",
                brightRed: "#ff0000",
                brightGreen: "#39ff14",
                brightYellow: "#39ff14",
                brightBlue: "#008f11",
                brightMagenta: "#39ff14",
                brightCyan: "#39ff14",
                brightWhite: "#39ff14"
            },
            paper: {
                background: "#f5f5dc",
                foreground: "#1a1a1a",
                cursor: "#1a1a1a",
                cursorAccent: "#f5f5dc",
                selectionBackground: "#c0c0a8",
                black: "#1a1a1a",
                red: "#8b0000",
                green: "#1a1a1a",
                yellow: "#654321",
                blue: "#4a4a4a",
                magenta: "#2e2e2e",
                cyan: "#4a4a4a",
                white: "#f5f5dc",
                brightBlack: "#8b8b7a",
                brightRed: "#8b0000",
                brightGreen: "#2e2e2e",
                brightYellow: "#654321",
                brightBlue: "#4a4a4a",
                brightMagenta: "#2e2e2e",
                brightCyan: "#4a4a4a",
                brightWhite: "#f5f5dc"
            },
            terminal: {
                background: "#000000",
                foreground: "#d4d4d4",
                cursor: "#d4d4d4",
                cursorAccent: "#000000",
                selectionBackground: "#3a3a3a",
                black: "#000000",
                red: "#e05252",
                green: "#4ec46c",
                yellow: "#e5e510",
                blue: "#4488ff",
                magenta: "#d670d6",
                cyan: "#29b8db",
                white: "#e5e5e5",
                brightBlack: "#505050",
                brightRed: "#ff6b6b",
                brightGreen: "#5af78e",
                brightYellow: "#f3f99d",
                brightBlue: "#6cb6ff",
                brightMagenta: "#ff92df",
                brightCyan: "#67e8f9",
                brightWhite: "#ffffff"
            }
        };

        // Load saved theme or default to server-configured theme
        const savedTheme = localStorage.getItem("termblog-theme") || defaultTheme || "pipboy";
        const initialTheme = themes[savedTheme] || themes[defaultTheme] || themes.pipboy;

        // Apply theme to page background
        function applyPageBackground(themeName) {
            const bg = termBlogThemes[themeName] || termBlogThemes.pipboy;
            document.documentElement.style.setProperty("background-color", bg, "important");
            document.body.style.setProperty("background-color", bg, "important");
            const container = document.getElementById("terminal-container");
            if (container) {
                container.style.setProperty("background-color", bg, "important");
            }
        }

        // Initialize terminal
        const term = new Terminal({
            cursorBlink: true,
            cursorStyle: "block",
            fontFamily: '"Fira Code", "Cascadia Code", Menlo, Monaco, "Courier New", monospace',
            fontSize: 14,
            lineHeight: 1.2,
            scrollback: 0,  // Disable scrollback to prevent rendering issues
            theme: initialTheme
        });

        // Apply initial page background
        applyPageBackground(savedTheme);

        const fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();

        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);

        const terminalElement = document.getElementById("terminal");
        term.open(terminalElement);

        // Enable WebGL renderer for GPU-accelerated rendering
        try {
            const webglAddon = new WebglAddon.WebglAddon();
            webglAddon.onContextLoss(() => {
                webglAddon.dispose();
            });
            term.loadAddon(webglAddon);
        } catch (e) {
            console.warn("WebGL renderer not available, using canvas fallback:", e);
        }

        // Write batching: accumulate incoming data and flush via requestAnimationFrame
        let pendingData = [];
        let rafScheduled = false;

        function flushPendingWrites() {
            rafScheduled = false;
            if (pendingData.length === 0) return;
            const batch = pendingData;
            pendingData = [];
            for (let i = 0; i < batch.length; i++) {
                term.write(batch[i]);
            }
        }

        function queueWrite(data) {
            pendingData.push(data);
            if (!rafScheduled) {
                rafScheduled = true;
                requestAnimationFrame(flushPendingWrites);
            }
        }

        // WebSocket connection with exponential backoff
        let ws;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        const baseReconnectDelay = 1000; // 1 second base delay

        // Fit terminal to container
        function fitTerminal() {
            fitAddon.fit();
            sendResize();
        }

        fitTerminal();
        window.addEventListener("resize", fitTerminal);

        let statusFadeTimeout = null;

        function setStatus(status, detail) {
            const statusEl = document.getElementById("status");

            // Clear any pending fade timeout
            if (statusFadeTimeout) {
                clearTimeout(statusFadeTimeout);
                statusFadeTimeout = null;
            }

            statusEl.className = status;

            // Set status text with optional detail
            let text = status.charAt(0).toUpperCase() + status.slice(1);
            if (detail) {
                text += ` (${detail})`;
            }
            statusEl.textContent = text;

            // Fade out connected status after 3 seconds
            if (status === "connected") {
                statusFadeTimeout = setTimeout(() => {
                    statusEl.classList.add("fade-out");
                }, 3000);
            }
        }

        function connect() {
            setStatus("connecting");

            // Pass saved theme to server so the TUI starts with the correct theme
            const connTheme = localStorage.getItem("termblog-theme");
            const connUrl = connTheme ? wsUrl + "?theme=" + encodeURIComponent(connTheme) : wsUrl;
            ws = new WebSocket(connUrl);
            ws.binaryType = "arraybuffer";

            ws.onopen = function() {
                document.getElementById("loading").classList.add("hidden");
                setStatus("connected");
                reconnectAttempts = 0;

                // Send initial resize
                setTimeout(sendResize, 100);
            };

            ws.onmessage = function(event) {
                let data;
                if (event.data instanceof ArrayBuffer) {
                    // Server sends deflate-compressed binary messages
                    try {
                        data = pako.inflateRaw(new Uint8Array(event.data));
                    } catch (e) {
                        // Fallback for uncompressed data
                        data = new Uint8Array(event.data);
                    }
                } else {
                    data = event.data;
                }

                // Check for OSC 7777 theme change sequence
                const dataStr = typeof data === "string" ? data : new TextDecoder().decode(data);

                const themeMatch = dataStr.match(/\x1b\]7777;theme=([a-z]+)\x07/);
                if (themeMatch) {
                    const themeName = themeMatch[1];
                    if (themes[themeName]) {
                        // Update xterm theme
                        term.options.theme = themes[themeName];
                        // Update page background
                        applyPageBackground(themeName);
                        // Save to localStorage
                        localStorage.setItem("termblog-theme", themeName);
                    }
                    // Remove the OSC sequence from output (don't display it)
                    const cleanedData = dataStr.replace(/\x1b\]7777;theme=[a-z]+\x07/g, "");
                    if (cleanedData) {
                        queueWrite(cleanedData);
                    }
                } else {
                    queueWrite(data);
                }
            };

            ws.onclose = function() {
                setStatus("disconnected");

                // Attempt reconnection with exponential backoff
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    // Exponential backoff: 1s, 2s, 4s, 8s, 16s (with jitter)
                    const delay = baseReconnectDelay * Math.pow(2, reconnectAttempts - 1);
                    const jitter = Math.random() * 500; // Add up to 500ms jitter
                    const totalDelay = delay + jitter;

                    setStatus("reconnecting", `attempt ${reconnectAttempts}/${maxReconnectAttempts}`);
                    term.write(`\r\n\x1b[33mReconnecting in ${Math.round(totalDelay / 1000)}s (attempt ${reconnectAttempts}/${maxReconnectAttempts})...\x1b[0m\r\n`);

                    setTimeout(connect, totalDelay);
                } else {
                    term.write("\r\n\x1b[31mConnection lost. Refresh the page to reconnect.\x1b[0m\r\n");
                }
            };

            ws.onerror = function(error) {
                console.error("WebSocket error:", error);
                setStatus("disconnected");
            };
        }

        function sendResize() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const dims = fitAddon.proposeDimensions();
                if (dims) {
                    // Send resize message: \x01{rows},{cols}
                    ws.send('\x01' + dims.rows + "," + dims.cols);
                }
            }
        }

        // Handle terminal input - send data to WebSocket
        term.onData(function(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(data);
            }
        });

        // Copy selection to clipboard on Ctrl+C when there's a selection
        term.attachCustomKeyEventHandler((e) => {
            if (e.ctrlKey && e.key === "c" && term.hasSelection()) {
                const selection = term.getSelection();
                navigator.clipboard.writeText(selection);
                return false; // Prevent sending to terminal
            }
            return true;
        });

        // Connect on load
        connect();

        // Focus terminal
        term.focus();
        terminalElement.addEventListener("click", () => term.focus());
    </script>
</body>
</html>
