<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden;
        }

        #terminal-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        #terminal {
            width: 100%;
            height: 100%;
            max-width: 1200px;
        }

        .xterm {
            height: 100%;
        }

        .xterm-viewport {
            overflow-y: hidden !important;
        }

        /* Loading indicator */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff00;
            font-family: monospace;
            font-size: 16px;
        }

        #loading.hidden {
            display: none;
        }

        /* Connection status */
        #status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 3px;
        }

        #status.connected {
            background-color: #003300;
            color: #00ff00;
			z-index: 2;
        }

        #status.disconnected {
            background-color: #330000;
            color: #ff3333;
        }

        #status.connecting {
            background-color: #333300;
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <div id="loading">Connecting...</div>
    <div id="status" class="connecting">Connecting</div>
    <div id="terminal-container">
        <div id="terminal"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <script>
        const wsUrl = "{{.WSUrl}}";

        // Initialize terminal
        const term = new Terminal({
            cursorBlink: true,
            cursorStyle: "block",
            fontFamily: '"Fira Code", "Cascadia Code", Menlo, Monaco, "Courier New", monospace',
            fontSize: 14,
            lineHeight: 1.2,
            scrollback: 0,  // Disable scrollback to prevent rendering issues
            theme: {
                background: "#0a0a0a",
                foreground: "#00ff00",
                cursor: "#00ff00",
                cursorAccent: "#0a0a0a",
                selectionBackground: "#003300",
                black: "#0a0a0a",
                red: "#ff3333",
                green: "#00ff00",
                yellow: "#ffcc00",
                blue: "#3399ff",
                magenta: "#ff33ff",
                cyan: "#33ffff",
                white: "#cccccc",
                brightBlack: "#666666",
                brightRed: "#ff6666",
                brightGreen: "#33ff33",
                brightYellow: "#ffff33",
                brightBlue: "#6699ff",
                brightMagenta: "#ff66ff",
                brightCyan: "#66ffff",
                brightWhite: "#ffffff"
            },
            allowProposedApi: true
        });

        const fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();

        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);

        const terminalElement = document.getElementById("terminal");
        term.open(terminalElement);

        // WebSocket connection
        let ws;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;

        // Fit terminal to container
        function fitTerminal() {
            fitAddon.fit();
            sendResize();
        }

        fitTerminal();
        window.addEventListener("resize", fitTerminal);

        function setStatus(status) {
            const statusEl = document.getElementById("status");
            statusEl.className = status;
            statusEl.textContent = status.charAt(0).toUpperCase() + status.slice(1);
        }

        function connect() {
            setStatus("connecting");

            ws = new WebSocket(wsUrl);
            ws.binaryType = "arraybuffer";

            ws.onopen = function() {
                document.getElementById("loading").classList.add("hidden");
                setStatus("connected");
                reconnectAttempts = 0;

                // Send initial resize
                setTimeout(sendResize, 100);
            };

            ws.onmessage = function(event) {
                if (event.data instanceof ArrayBuffer) {
                    term.write(new Uint8Array(event.data));
                } else {
                    term.write(event.data);
                }
            };

            ws.onclose = function() {
                setStatus("disconnected");

                // Attempt reconnection
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    setTimeout(connect, 2000 * reconnectAttempts);
                } else {
                    term.write("\r\n\x1b[31mConnection lost. Refresh to reconnect.\x1b[0m\r\n");
                }
            };

            ws.onerror = function(error) {
                console.error("WebSocket error:", error);
                setStatus("disconnected");
            };
        }

        function sendResize() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const dims = fitAddon.proposeDimensions();
                if (dims) {
                    // Send resize message: \x01{rows},{cols}
                    ws.send('\x01' + dims.rows + "," + dims.cols);
                }
            }
        }

        // Handle terminal input - send data to WebSocket
        term.onData(function(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(data);
            }
        });

        // Copy selection to clipboard on Ctrl+C when there's a selection
        term.attachCustomKeyEventHandler((e) => {
            if (e.ctrlKey && e.key === "c" && term.hasSelection()) {
                const selection = term.getSelection();
                navigator.clipboard.writeText(selection);
                return false; // Prevent sending to terminal
            }
            return true;
        });

        // Connect on load
        connect();

        // Focus terminal
        term.focus();
        terminalElement.addEventListener("click", () => term.focus());
    </script>
</body>
</html>
