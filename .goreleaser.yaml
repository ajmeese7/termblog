# GoReleaser configuration
# Documentation: https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: termblog
    main: ./cmd/termblog
    binary: termblog
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ajmeese7/termblog/internal/version.Version={{.Version}}
      - -X github.com/ajmeese7/termblog/internal/version.Commit={{.ShortCommit}}
      - -X github.com/ajmeese7/termblog/internal/version.Date={{.Date}}
    # CGO is required for SQLite
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=gcc
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - config.yaml.example

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  format: "* {{ .Message }} ([`{{ printf \"%.7s\" .SHA }}`](https://github.com/ajmeese7/termblog/commit/{{ .SHA }}))"
  filters:
    exclude:
      - '^test:'
      - '^chore:'
      - '^Initial commit'
      - '^MVP:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1

release:
  github:
    owner: ajmeese7
    name: termblog
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    See [README](https://github.com/ajmeese7/termblog#installation) for installation instructions.
  footer: |
    {{ if .PreviousTag }}**Full Changelog**: https://github.com/ajmeese7/termblog/compare/{{ .PreviousTag }}...{{ .Tag }}{{ else }}**Full Changelog**: https://github.com/ajmeese7/termblog/commits/{{ .Tag }}{{ end }}
