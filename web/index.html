<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link data-trunk rel="rust" />
    <title>TermBlog</title>
    <!--TERMBLOG_FAVICON-->
    <script>
      // Apply saved theme background immediately to prevent flash of wrong color.
      // Must match background_hex values in web/src/theme.rs.
      (function() {
        const themes = {
          pipboy:"#0a0a0a", dracula:"#282a36", nord:"#2e3440", monokai:"#272822",
          monochrome:"#000000", amber:"#0d0800", matrix:"#0d0208", paper:"#f5f5dc",
          terminal:"#1e1e1e"
        };
        let saved = null;
        try { saved = localStorage.getItem("termblog-theme"); } catch(e) {}
        const bg = (saved && themes[saved]) ?? themes.pipboy;
        document.documentElement.style.backgroundColor = bg;

        // If favicon mode is letter or emoji, repaint the icon for the saved
        // theme so a returning visitor sees their last theme's color in the
        // tab without waiting for WASM to boot.
        try {
          const meta = document.querySelector('meta[name="termblog-favicon-mode"]');
          const mode = meta ? meta.getAttribute("content") : "";
          if (saved && (mode === "letter" || mode === "emoji")) {
            const link = document.querySelector('link[rel="icon"]');
            if (link) link.href = "/favicon?theme=" + encodeURIComponent(saved);
          }
        } catch(e) {}
      })();
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 100%;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: background-color 0.3s ease;
      }
      pre {
        font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono", monospace;
        font-size: 14px;
        line-height: 16px;
        margin: 0;
      }
    </style>
  </head>
  <body></body>
</html>
